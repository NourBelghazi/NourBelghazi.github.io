<!DOCTYPE html>
<html lang="en">

<head>
  <base href="/games/dino/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHROME DINOSAUR — TeaVM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f7f7f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }

    #gameCanvas {
      display: block;
      border: 2px solid #555;
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 80vh;
      width: auto;
      height: auto;
    }

    #hint {
      color: #666;
      font-size: 12px;
      margin-top: 8px;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <!-- Pre-loaded sprites -->
  <div style="display:none">
    <img id="img-dino-run1" src="images/dino-run1.png">
    <img id="img-dino-run2" src="images/dino-run2.png">
    <img id="img-dino-dead" src="images/dino-dead.png">
    <img id="img-dino-jump" src="images/dino-jump.png">
    <img id="img-dino-duck1" src="images/dino-duck1.png">
    <img id="img-dino-duck2" src="images/dino-duck2.png">
    <img id="img-bird1" src="images/bird1.png">
    <img id="img-bird2" src="images/bird2.png">
    <img id="img-cactus1" src="images/cactus1.png">
    <img id="img-cactus2" src="images/cactus2.png">
    <img id="img-cactus3" src="images/cactus3.png">
    <img id="img-big-cactus1" src="images/big-cactus1.png">
    <img id="img-big-cactus2" src="images/big-cactus2.png">
    <img id="img-big-cactus3" src="images/big-cactus3.png">
    <img id="img-track" src="images/track.png">
    <img id="img-cloud" src="images/cloud.png">
    <img id="img-game-over" src="images/game-over.png">
    <img id="img-reset" src="images/reset.png">
  </div>

  <canvas id="gameCanvas"></canvas>
  <p id="hint">SPACE / UP — jump &nbsp;|&nbsp; DOWN — duck &nbsp;|&nbsp; ENTER — restart</p>

  <script src="classes.js"></script>
  <script>
    if (typeof main === 'function') { main(); }
  </script>
</body>

</html>
